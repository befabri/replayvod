version: "2"
sql:
  - engine: "postgresql"
    queries: "./queries/postgres"
    schema: "./migrations/postgres"
    gen:
      go:
        package: "pggen"
        out: "internal/repository/pgadapter/pggen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        overrides:
          # Timestamps: both table columns and query outputs should come out as
          # time.Time (NOT NULL) or *time.Time (NULL). Defaults to pgtype
          # under pgx/v5 — overriding keeps domain code free of pgtype.
          - db_type: "pg_catalog.timestamptz"
            nullable: false
            go_type: { import: "time", type: "Time" }
          - db_type: "pg_catalog.timestamptz"
            nullable: true
            go_type: { import: "time", type: "Time", pointer: true }
          - db_type: "timestamptz"
            nullable: false
            go_type: { import: "time", type: "Time" }
          - db_type: "timestamptz"
            nullable: true
            go_type: { import: "time", type: "Time", pointer: true }

          # Nullable text → *string (keeps consistency with SQLite sql.NullString → *string in the adapter).
          - db_type: "text"
            nullable: true
            go_type: { type: "string", pointer: true }
          - db_type: "pg_catalog.text"
            nullable: true
            go_type: { type: "string", pointer: true }

          # Nullable bool → *bool
          - db_type: "pg_catalog.bool"
            nullable: true
            go_type: { type: "bool", pointer: true }
          - db_type: "bool"
            nullable: true
            go_type: { type: "bool", pointer: true }

          # Nullable bigint → *int64
          - db_type: "pg_catalog.int8"
            nullable: true
            go_type: { type: "int64", pointer: true }

          # Nullable integer → *int32 (4-byte)
          - db_type: "pg_catalog.int4"
            nullable: true
            go_type: { type: "int32", pointer: true }

          # Nullable double → *float64
          - db_type: "pg_catalog.float8"
            nullable: true
            go_type: { type: "float64", pointer: true }

          # JSONB → json.RawMessage (semantically equivalent to []byte but
          # self-documenting at call sites: reviewers see "this is JSON, not
          # arbitrary bytes"). Applies to both NOT NULL and NULL columns.
          - db_type: "jsonb"
            go_type: { import: "encoding/json", type: "RawMessage" }
          - db_type: "jsonb"
            nullable: true
            go_type: { import: "encoding/json", type: "RawMessage" }

  - engine: "sqlite"
    queries: "./queries/sqlite"
    schema: "./migrations/sqlite"
    gen:
      go:
        package: "sqlitegen"
        out: "internal/repository/sqliteadapter/sqlitegen"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        overrides:
          # Exact timestamp overrides keep ordinary TEXT fields as strings and
          # make malformed non-NULL timestamp scans fail.
          - column: "app_access_tokens.expires_at"
            go_type: { import: "github.com/befabri/replayvod/server/internal/repository/sqliteadapter/sqlitetype", type: "Time" }
          - column: "app_access_tokens.created_at"
            go_type: { import: "github.com/befabri/replayvod/server/internal/repository/sqliteadapter/sqlitetype", type: "Time" }
