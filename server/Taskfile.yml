version: "3"

vars:
  BINARY_NAME: server
  # Ratchet ceiling for `task crap:gate`. No function in internal/ may exceed
  # this CRAP score. It only goes down: as you cover/refactor the worst
  # offenders, run `task crap` to see the new max and lower this toward 6.0.
  CRAP_CEILING: "1579.4"
  # Package names excluded from the CRAP report and gate (regex on the package
  # column). Generated code can't be refactored, so it doesn't belong in a
  # quality ratchet. Add to this pipe-separated list if needed.
  CRAP_EXCLUDE: "sqlitegen|pggen"

tasks:
  build:
    desc: Build the server binary
    cmds:
      - go build -o {{.BINARY_NAME}} ./cmd/server

  dev:
    desc: Run the server in development mode
    cmds:
      - go run ./cmd/server

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  cover:
    desc: |
      Write a cross-package coverage profile to target/coverage/coverage.out.
      Uses -coverpkg=./... so coverage from sibling-package tests counts (a
      handler test exercising a service in another package, etc). Plain
      per-package coverage would report that service as untested. Required by
      the crap and mutate targets.
    cmds:
      - mkdir -p target/coverage
      - go test -coverpkg=./... -coverprofile=target/coverage/coverage.out ./...

  crap:
    desc: |
      CRAP report (cyclomatic complexity x coverage) for internal/, worst
      first. CRAP = CC^2 * (1 - coverage)^3 + CC, so a function needs more
      coverage the more complex it is, and a CC>=7 function can never drop to
      6.0 without being simplified. Prints the current max next to the gate
      ceiling so you know how far CRAP_CEILING can be lowered.
    cmds:
      - task: cover
      - |
        go tool goqual crap internal/ --reuse-coverage \
          | awk -v ceil={{.CRAP_CEILING}} -v excl='{{.CRAP_EXCLUDE}}' '
              NR<=4 { print; next }
              $NF !~ /^[0-9.]+$/ { print; next }
              excl != "" && $2 ~ excl { next }
              { print; n++; v=$NF+0; if (v>max) max=v; if (v>6.0) o6++ }
              END { printf "\n%d functions | max %.1f | over 6.0: %d | gate ceiling %s\n", n, max, o6, ceil }'

  crap:gate:
    desc: |
      Ratchet gate: fail if any internal/ function exceeds CRAP_CEILING.
      The ceiling only moves down. After covering or simplifying the worst
      offenders, run `task crap`, then lower CRAP_CEILING in this file toward
      6.0 so the improvement is locked in. Generated packages (CRAP_EXCLUDE)
      are skipped.
    cmds:
      - task: cover
      - |
        go tool goqual crap internal/ --reuse-coverage \
          | awk -v ceil={{.CRAP_CEILING}} -v excl='{{.CRAP_EXCLUDE}}' '
              NR<=4 { next }
              $NF !~ /^[0-9.]+$/ { next }
              excl != "" && $2 ~ excl { next }
              { v=$NF+0; if (v>max) max=v;
                if (v > ceil+0.05) { over++; printf "  OVER %s: %-34s (%s) CRAP=%s\n", ceil, $1, $2, $NF } }
              END { printf "current max CRAP: %.1f  (ceiling %s)\n", max, ceil;
                    if (over>0) { printf "FAIL: %d function(s) over the ceiling\n", over; exit 1 }
                    print "OK: nothing over the ceiling" }'

  mutate:
    desc: |
      Mutation-test one source file: flips one operator/literal/bool at a time
      (+/-, >/>=, ==/!=, &&/||, true/false, 0/1), reruns tests, and reports
      survivors. A survivor means the line runs under test but nothing asserts
      on it. Reuses the profile from `task cover`, so run that first.
      Usage:
        task cover
        task mutate -- internal/config/helpers.go
        task mutate -- internal/config/helpers.go --strict   # fail on survived/uncovered
    cmds:
      - go tool goqual mutate {{.CLI_ARGS}} --reuse-coverage

  test-integration:
    desc: |
      Run integration tests that need Docker. Currently only
      internal/storage (Garage-backed S3 wire tests) tags in, but the
      scope will grow as more packages add //go:build integration
      tests — any future dir joining the run is automatic.
    cmds:
      - go test -tags integration -count=1 ./...

  test-live:
    desc: |
      Run live tests that hit real Twitch endpoints (gql.twitch.tv,
      usher.ttvnw.net). Opt-in via //go:build live. Set
      TWITCH_LIVE_CHANNEL to a currently-live channel; defaults to a
      channel that was live when the test was written.
    cmds:
      - go test -tags live -count=1 -v -run Live ./internal/downloader/twitch/...

  test-ffmpeg:
    desc: |
      Run tests that invoke real ffmpeg + ffprobe against synthetic
      fragments generated at test time. Opt-in via //go:build ffmpeg
      so CI environments without ffmpeg in PATH aren't forced to
      install it. These tests are the only thing that catches argv
      regressions against newer ffmpeg versions — the pure-argv
      tests compare our output against our expectation, which is
      worthless when both sides drift together.

      Also covers the downloader-level integration harness
      (multipart_real_test.go) which stands up a fake Twitch edge
      and runs the full Service.run pipeline against real ffmpeg —
      end-to-end coverage of Phase 6f's part-split path.
    cmds:
      - go test -tags ffmpeg -count=1 -v -run TestReal ./internal/downloader/remux/...
      - go test -tags ffmpeg -count=1 -v -run "^TestMultipart_|^TestResume_" ./internal/downloader/...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  sqlc:
    desc: Generate sqlc code
    cmds:
      - sqlc generate

  trpcgen:
    desc: Generate TypeScript + Zod types from tRPC procedures
    cmds:
      - go tool trpcgo generate -o ../dashboard/src/api/generated/trpc.ts --zod ../dashboard/src/api/generated/zod.ts --enums ../dashboard/src/api/generated/enums.ts ./internal/server/api/...

  trpcgen:check:
    desc: CI gate — fails when committed dashboard/src/api/generated/ is out of sync with the tRPC procedures
    cmds:
      - task: trpcgen
      - git diff --exit-code ../dashboard/src/api/generated/

  twitch-api-gen:
    desc: Regenerate Twitch API types and client from docs
    cmds:
      - go run ./tools/twitch-api-gen -out ./internal/twitch/

  twitch-api-gen:regen-snapshot:
    desc: Update committed test fixtures from the current cached reference HTML
    cmds:
      - cp ./tmp/reference.html ./tools/twitch-api-gen/testdata/reference-snapshot.html
      - cp ./tmp/eventsub-reference.html ./tools/twitch-api-gen/testdata/eventsub-reference-snapshot.html
      - cp ./tmp/eventsub-subscription-types.html ./tools/twitch-api-gen/testdata/eventsub-subscription-types-snapshot.html
      - go run ./tools/twitch-api-gen -out ./tools/twitch-api-gen/testdata/expected -schema-out ./tools/twitch-api-gen/testdata/normalized-schema.json -cache ./tools/twitch-api-gen/testdata/reference-snapshot.html -eventsub-ref-cache ./tools/twitch-api-gen/testdata/eventsub-reference-snapshot.html -eventsub-types-cache ./tools/twitch-api-gen/testdata/eventsub-subscription-types-snapshot.html

  twitch-api-gen:check:
    desc: CI gate — fails (exit 2) when committed internal/twitch/generated_*.go is out of sync with the generator; exit 1 on infra errors
    cmds:
      - go run ./tools/twitch-api-gen -check -out ./internal/twitch/ -schema-in ./tools/twitch-api-gen/testdata/normalized-schema.json

  gen:
    desc: Run all code generation (sqlc + trpcgen)
    cmds:
      - task: sqlc
      - task: trpcgen

  migrate:
    desc: Run database migrations (requires running server)
    cmds:
      - echo "Migrations run automatically on server start"

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY_NAME}}

  fmt:
    desc: Format Go code
    cmds:
      - gofmt -w .

  check:
    desc: Run all checks (vet + test)
    cmds:
      - task: vet
      - task: test
