version: "3"

vars:
  BINARY_NAME: server

tasks:
  build:
    desc: Build the server binary
    cmds:
      - go build -o {{.BINARY_NAME}} ./cmd/server

  dev:
    desc: Run the server in development mode
    cmds:
      - go run ./cmd/server

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  test-integration:
    desc: Run integration tests that need Docker (Garage for S3 backend)
    cmds:
      - go test -tags integration -count=1 ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  sqlc:
    desc: Generate sqlc code
    cmds:
      - sqlc generate

  trpcgen:
    desc: Generate TypeScript + Zod types from tRPC procedures
    cmds:
      - go tool trpcgo generate -o ../dashboard/src/api/generated/trpc.ts --zod ../dashboard/src/api/generated/zod.ts ./...

  twitch-api-gen:
    desc: Regenerate Twitch API types and client from docs
    cmds:
      - go run ./tools/twitch-api-gen -out ./internal/twitch/

  twitch-api-gen:regen-snapshot:
    desc: Update committed test fixtures from the current cached reference HTML
    cmds:
      - cp ./tmp/reference.html ./tools/twitch-api-gen/testdata/reference-snapshot.html
      - cp ./tmp/eventsub-reference.html ./tools/twitch-api-gen/testdata/eventsub-reference-snapshot.html
      - cp ./tmp/eventsub-subscription-types.html ./tools/twitch-api-gen/testdata/eventsub-subscription-types-snapshot.html
      - go run ./tools/twitch-api-gen -out ./tools/twitch-api-gen/testdata/expected -cache ./tools/twitch-api-gen/testdata/reference-snapshot.html -eventsub-ref-cache ./tools/twitch-api-gen/testdata/eventsub-reference-snapshot.html -eventsub-types-cache ./tools/twitch-api-gen/testdata/eventsub-subscription-types-snapshot.html -timestamp 2026-04-12T00:00:00Z

  twitch-api-gen:check:
    desc: CI gate — fails (exit 2) when committed internal/twitch/generated_*.go is out of sync with the generator; exit 1 on infra errors
    cmds:
      - go run ./tools/twitch-api-gen -check -out ./internal/twitch/ -cache ./tools/twitch-api-gen/testdata/reference-snapshot.html -eventsub-ref-cache ./tools/twitch-api-gen/testdata/eventsub-reference-snapshot.html -eventsub-types-cache ./tools/twitch-api-gen/testdata/eventsub-subscription-types-snapshot.html

  gen:
    desc: Run all code generation (sqlc + trpcgen)
    cmds:
      - task: sqlc
      - task: trpcgen

  migrate:
    desc: Run database migrations (requires running server)
    cmds:
      - echo "Migrations run automatically on server start"

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY_NAME}}

  fmt:
    desc: Format Go code
    cmds:
      - gofmt -w .

  check:
    desc: Run all checks (vet + test)
    cmds:
      - task: vet
      - task: test
