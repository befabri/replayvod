version: "3"

vars:
  BINARY_NAME: server

tasks:
  build:
    desc: Build the server binary
    cmds:
      - go build -o {{.BINARY_NAME}} ./cmd/server

  dev:
    desc: Run the server in development mode
    cmds:
      - go run ./cmd/server

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  test-integration:
    desc: |
      Run integration tests that need Docker. Currently only
      internal/storage (Garage-backed S3 wire tests) tags in, but the
      scope will grow as more packages add //go:build integration
      tests — any future dir joining the run is automatic.
    cmds:
      - go test -tags integration -count=1 ./...

  test-live:
    desc: |
      Run live tests that hit real Twitch endpoints (gql.twitch.tv,
      usher.ttvnw.net). Opt-in via //go:build live. Set
      TWITCH_LIVE_CHANNEL to a currently-live channel; defaults to a
      channel that was live when the test was written.
    cmds:
      - go test -tags live -count=1 -v -run Live ./internal/downloader/twitch/...

  test-ffmpeg:
    desc: |
      Run tests that invoke real ffmpeg + ffprobe against synthetic
      fragments generated at test time. Opt-in via //go:build ffmpeg
      so CI environments without ffmpeg in PATH aren't forced to
      install it. These tests are the only thing that catches argv
      regressions against newer ffmpeg versions — the pure-argv
      tests compare our output against our expectation, which is
      worthless when both sides drift together.

      Also covers the downloader-level integration harness
      (multipart_real_test.go) which stands up a fake Twitch edge
      and runs the full Service.run pipeline against real ffmpeg —
      end-to-end coverage of Phase 6f's part-split path.
    cmds:
      - go test -tags ffmpeg -count=1 -v -run TestReal ./internal/downloader/remux/...
      - go test -tags ffmpeg -count=1 -v -run "^TestMultipart_|^TestResume_" ./internal/downloader/...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  sqlc:
    desc: Generate sqlc code
    cmds:
      - sqlc generate

  trpcgen:
    desc: Generate TypeScript + Zod types from tRPC procedures
    cmds:
      - go tool trpcgo generate -o ../dashboard/src/api/generated/trpc.ts --zod ../dashboard/src/api/generated/zod.ts ./...

  twitch-api-gen:
    desc: Regenerate Twitch API types and client from docs
    cmds:
      - go run ./tools/twitch-api-gen -out ./internal/twitch/

  twitch-api-gen:regen-snapshot:
    desc: Update committed test fixtures from the current cached reference HTML
    cmds:
      - cp ./tmp/reference.html ./tools/twitch-api-gen/testdata/reference-snapshot.html
      - cp ./tmp/eventsub-reference.html ./tools/twitch-api-gen/testdata/eventsub-reference-snapshot.html
      - cp ./tmp/eventsub-subscription-types.html ./tools/twitch-api-gen/testdata/eventsub-subscription-types-snapshot.html
      - go run ./tools/twitch-api-gen -out ./tools/twitch-api-gen/testdata/expected -schema-out ./tools/twitch-api-gen/testdata/normalized-schema.json -cache ./tools/twitch-api-gen/testdata/reference-snapshot.html -eventsub-ref-cache ./tools/twitch-api-gen/testdata/eventsub-reference-snapshot.html -eventsub-types-cache ./tools/twitch-api-gen/testdata/eventsub-subscription-types-snapshot.html

  twitch-api-gen:check:
    desc: CI gate — fails (exit 2) when committed internal/twitch/generated_*.go is out of sync with the generator; exit 1 on infra errors
    cmds:
      - go run ./tools/twitch-api-gen -check -out ./internal/twitch/ -schema-in ./tools/twitch-api-gen/testdata/normalized-schema.json

  gen:
    desc: Run all code generation (sqlc + trpcgen)
    cmds:
      - task: sqlc
      - task: trpcgen

  migrate:
    desc: Run database migrations (requires running server)
    cmds:
      - echo "Migrations run automatically on server start"

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY_NAME}}

  fmt:
    desc: Format Go code
    cmds:
      - gofmt -w .

  check:
    desc: Run all checks (vet + test)
    cmds:
      - task: vet
      - task: test
