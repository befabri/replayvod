version: "3"

vars:
  BINARY_NAME: server

tasks:
  build:
    desc: Build the server binary
    cmds:
      - go build -o {{.BINARY_NAME}} ./cmd/server

  dev:
    desc: Run the server in development mode
    cmds:
      - go run ./cmd/server

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  sqlc:
    desc: Generate sqlc code
    cmds:
      - sqlc generate

  migrate:
    desc: Run database migrations (requires running server)
    cmds:
      - echo "Migrations run automatically on server start"

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY_NAME}}

  fmt:
    desc: Format Go code
    cmds:
      - gofmt -w .

  check:
    desc: Run all checks (vet + test)
    cmds:
      - task: vet
      - task: test
