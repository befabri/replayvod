development = true

[server]
poll_interval_minutes = 1

[download]
max_concurrent = 5
preferred_quality = "1080"
segment_concurrency = 4
network_attempts = 5
server_error_attempts = 5
cdn_lag_attempts = 3
auth_refresh_attempts = 2
max_gap_ratio = 0.01
strict = false
enable_av1 = false
disable_hevc = false
max_restart_gap_seconds = 120
# Optional recording part limits.
# Start a new part when either the size or duration limit is reached.
# Splits happen between segments, so none are lost or duplicated.
# Defaults to 0 = disabled; negative values are treated as 0.
# max_part_bytes = 4000000000
# max_part_seconds = 3600
# max_part_count = 1024
# Lifetime, in hours, for signed part-download URLs sent in recording webhooks.
# Capped by the recording retention deadline when auto-delete is enabled.
# Set to 0 to omit URLs and send storage paths only.
# Default: 168 (7 days).
signed_url_ttl_hours = 168

[storage]
type = "local"
local_path = "./data"

[storage.s3]
endpoint = ""
bucket = ""
region = ""
access_key = ""
secret_key = ""

[scheduler]
enabled = true
thumbnail_interval_minutes = 5
eventsub_interval_minutes = 10
eventsub_reconcile_interval_minutes = 60
category_art_interval_minutes = 1440
token_cleanup_interval_minutes = 60
# How often to sweep for recordings past their schedule's auto-delete
# window (time_before_delete, in hours). This is a poll cadence, not a
# retention window. 0 disables auto-delete entirely.
recordings_retention_interval_minutes = 60
# Prune terminal (delivered/rejected/failed) rows from the recording-webhook
# delivery outbox older than this many days. Queued/in-flight rows are never
# pruned. 0 disables the sweep (the table then grows unbounded).
recording_webhook_delivery_retention_days = 30

[logging]
log_to_file = false
log_dir = "./logs"
log_level = "debug"

[postgres]
max_conns = 25
min_conns = 5
max_conn_lifetime_ms = 1800000
max_conn_idle_time_ms = 300000
health_check_period_ms = 30000

# Exposes an unauthenticated GET /api/v1/health that pings the DB —
# 200 on success, 503 on failure. The bundled docker-compose relies on
# this for its healthcheck, so it's on by default; flip off on
# deployments that don't want an unauthenticated probe.
[health]
enabled = true
