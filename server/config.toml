development = true

[server]
allowed_origins = ["http://localhost:3000"]

[download]
max_concurrent = 2
preferred_quality = "1080"
segment_concurrency = 4
network_attempts = 5
server_error_attempts = 5
cdn_lag_attempts = 3
auth_refresh_attempts = 2
max_gap_ratio = 0.01
strict = false
enable_av1 = false
disable_hevc = false
max_restart_gap_seconds = 120
audio_rate = 48000

[storage]
type = "local"
local_path = "./data"

[storage.s3]
endpoint = ""
bucket = ""
region = ""
access_key = ""
secret_key = ""

[storage.rclone]
remote = ""

[scheduler]
enabled = true
thumbnail_interval_minutes = 5
eventsub_interval_minutes = 10
category_art_interval_minutes = 1440
token_cleanup_interval_minutes = 60

[logging]
log_to_file = false
log_dir = "./logs"
log_level = "debug"
sample_rate = 1.0

[postgres]
max_conns = 25
min_conns = 5
max_conn_lifetime_ms = 1800000
max_conn_idle_time_ms = 300000
health_check_period_ms = 30000
