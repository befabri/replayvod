name: Public CI

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - 'relay/**'
      - 'server/**'
      - 'dashboard/**'
      - 'docker-compose.yml'
      - 'README.md'
      - '.github/workflows/landing.yml'
  pull_request:
    paths:
      - 'landing/**'
      - 'relay/**'
      - 'server/**'
      - 'dashboard/**'
      - 'docker-compose.yml'
      - 'README.md'
      - '.github/workflows/landing.yml'

jobs:
  landing:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: landing/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm run test:install

  relay:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relay
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: relay/package-lock.json
      - run: npm ci
      - run: npm test

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      - run: go test ./...
      # Real ffmpeg/ffprobe integration tests (build tag `ffmpeg`) — the
      # only coverage that catches ffmpeg argv regressions and exercises
      # the full Service.run part-split / resume pipeline end to end.
      # Mirrors the `test-ffmpeg` Taskfile target.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Integration tests (ffmpeg)
        run: |
          go test -tags ffmpeg -count=1 -run TestReal ./internal/downloader/remux/...
          go test -tags ffmpeg -count=1 -run "^TestMultipart_|^TestResume_" ./internal/downloader/...
      - run: go run ./tools/twitch-api-gen -check -out ./internal/twitch/ -schema-in ./tools/twitch-api-gen/testdata/normalized-schema.json
      # The dashboard's tRPC/Zod/enum bindings are committed so the Node CI
      # job needs no Go toolchain. Regenerate them here and fail on drift,
      # mirroring the twitch-api-gen gate above.
      - name: Check committed tRPC bindings are up to date
        run: |
          go tool trpcgo generate -o ../dashboard/src/api/generated/trpc.ts --zod ../dashboard/src/api/generated/zod.ts --enums ../dashboard/src/api/generated/enums.ts ./internal/server/api/...
          git diff --exit-code ../dashboard/src/api/generated/

  server-integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      # Testcontainers boots Postgres and Garage for storage/relay e2e coverage.
      # Keep this separate from the fast unit job because container startup is slower.
      - name: Integration tests (testcontainers)
        run: go test -tags integration -count=1 ./...
