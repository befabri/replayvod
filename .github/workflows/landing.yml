name: Public CI

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - 'relay/**'
      - 'server/**'
      - 'docker-compose.yml'
      - 'README.md'
      - '.github/workflows/landing.yml'
  pull_request:
    paths:
      - 'landing/**'
      - 'relay/**'
      - 'server/**'
      - 'docker-compose.yml'
      - 'README.md'
      - '.github/workflows/landing.yml'

jobs:
  landing:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: landing/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm run test:install

  relay:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relay
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: relay/package-lock.json
      - run: npm ci
      - run: npm test

  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      - run: go test ./...
      - run: go run ./tools/twitch-api-gen -check -out ./internal/twitch/ -schema-in ./tools/twitch-api-gen/testdata/normalized-schema.json
