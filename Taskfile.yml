# Taskfile for replayvod — https://taskfile.dev
#
# Install task once:  brew install go-task | pacman -S go-task | scoop install task
# Then from this repo:
#   task              # list tasks
#   task dev          # run server + dashboard concurrently
#   task build        # production build of both
#
# The repo has two independently-buildable components:
#   server/      — Go backend (cmd/server/main.go)
#   dashboard/   — React frontend (Vite SPA)

version: "3"

output: prefixed

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list-all
    silent: true

  setup:
    desc: Install Go modules + dashboard npm deps
    cmds:
      - task: server:setup
      - task: dashboard:setup

  dev:
    desc: Run server + dashboard concurrently (Ctrl-C stops both)
    deps: [server:dev, dashboard:dev]

  build:
    desc: Production build of server and dashboard
    cmds:
      - task: server:build
      - task: dashboard:build

  check:
    desc: Typecheck + lint everything
    cmds:
      - task: server:check
      - task: dashboard:check

  test:
    desc: Run all tests (Go + Vitest)
    cmds:
      - task: server:test
      - task: dashboard:test

  # ---- server (Go) ----

  server:setup:
    dir: server
    cmds:
      - go mod download

  server:dev:
    dir: server
    desc: Run the Go server with live-reload via `go run`
    prefix: server
    cmds:
      - go run ./cmd/server

  server:build:
    dir: server
    desc: Compile the server binary to server/bin/replayvod
    cmds:
      - go build -o bin/replayvod ./cmd/server

  server:check:
    dir: server
    cmds:
      - go vet ./...

  server:test:
    dir: server
    cmds:
      - go test ./...

  # ---- dashboard (Vite SPA) ----

  dashboard:setup:
    dir: dashboard
    cmds:
      - npm install

  dashboard:dev:
    dir: dashboard
    desc: Vite dev server on :3000 with backend proxy
    prefix: dashboard
    cmds:
      - npm run dev

  dashboard:build:
    dir: dashboard
    cmds:
      - npm run build

  dashboard:check:
    dir: dashboard
    desc: Biome check + TypeScript typecheck
    cmds:
      - npm run check
      - npx tsc --noEmit

  dashboard:test:
    dir: dashboard
    cmds:
      - npm run test

  # ---- hosted Connect stack (landing + cloud + relay) ----
  #
  # Runs the marketing site, the private auth/billing worker, and the
  # webhook relay together so the Connect dashboard at /account works
  # end to end against local services. See cloud/.dev.vars and
  # landing/.env for configuration.
  #   landing  → http://localhost:4322
  #   cloud    → http://localhost:8787
  #   relay    → http://localhost:8788

  dev:hosted:
    desc: Run landing + cloud + relay concurrently (Ctrl-C stops all)
    deps: [landing:dev, cloud:dev, relay:dev]

  landing:dev:
    dir: landing
    desc: Astro dev server on :4322
    prefix: landing
    cmds:
      - npm run dev -- --port 4322

  cloud:dev:
    dir: cloud
    desc: Cloud worker on :8787 (wrangler dev)
    prefix: cloud
    cmds:
      - npm run dev

  relay:dev:
    dir: relay
    desc: Relay worker on :8788 (wrangler dev)
    prefix: relay
    cmds:
      - npm run dev

  verify:relay:
    dir: relay
    desc: Run end-to-end synthetic-Twitch checks against the deployed relay (RELAY_TOKEN required)
    cmds:
      - npm run verify:prod

  # ---- docker (production deploy) ----
  #
  # Compose interpolates ${VAR} from the file passed via --env-file. We
  # pin it to server/.env so the Twitch credentials, secrets, and
  # POSTGRES_PASSWORD that the user already filled in there are the
  # single source of truth — no duplicate root-level .env required.
  #
  # The compose file is split into postgres/sqlite profiles; set
  # `COMPOSE_PROFILES=sqlite` (or `=postgres`) in server/.env so these
  # tasks know which variant to start, or invoke compose directly with
  # `--profile <name>`.

  docker:build:
    desc: Build the production image (requires COMPOSE_PROFILES in server/.env)
    cmds:
      - docker compose --env-file server/.env build

  docker:up:
    desc: Start the stack in the background (requires COMPOSE_PROFILES in server/.env)
    cmds:
      - docker compose --env-file server/.env up -d

  docker:down:
    desc: Stop and remove containers (volumes preserved)
    cmds:
      - docker compose --env-file server/.env down

  docker:logs:
    desc: Tail logs from the active profile's services
    cmds:
      - docker compose --env-file server/.env logs -f
